name: Sync Shared Config

on:
  push:
    branches: [main]
    paths:
      - 'shared/**'
  schedule:
    - cron: '0 9 * * 1' # Monday 9 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Configure git
        env:
          GH_TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
        run: |
          git config --global user.name "ColetonCodes-LLC"
          git config --global user.email "coletoncodes@gmail.com"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Sync to target repos
        env:
          GH_TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          ORG="ColetonCodes-LLC"
          SHARED_DIR="$(pwd)/source/shared"
          NEW_VERSION=$(cat "$SHARED_DIR/VERSION")
          BRANCH_NAME="chore/sync-shared-config-v${NEW_VERSION}"

          declare -A TARGETS=(
            [paperclip]=main
            [autotube]=main
            [family-quest]=main
            [pro-act]=master
            [pro-act-website]=main
            [PrioriPlanner]=main
            [TCATemplate]=master
            [coletoncodes-website]=main
            [family-quest-web]=main
            [flutter-template]=master
            [appgrowthco]=main
          )

          PR_BODY="Automated sync from [ColetonCodes-LLC/.github](https://github.com/ColetonCodes-LLC/.github).

          **Updated shared files:**
          - Workflows (claude.yml, claude-code-review.yml)
          - Rules (architecture, anti-slop, tdd, commits, pull-requests, security, agents)
          - Skills (create-pr)

          **Version:** v${NEW_VERSION}

          Review the diff to ensure no local customizations are overwritten."

          for repo in "${!TARGETS[@]}"; do
            default_branch="${TARGETS[$repo]}"
            echo "=== $repo ($default_branch) ==="

            # Check current version
            current_version=$(gh api "repos/$ORG/$repo/contents/.claude/.shared-version" \
              --jq '.content' 2>&1 | base64 -d 2>&1 || echo "0")
            current_version=$(echo "$current_version" | tr -d '[:space:]')

            if [ "$current_version" = "$NEW_VERSION" ]; then
              echo "  Already at v${NEW_VERSION}, skipping"
              continue
            fi

            # Check if PR already exists
            existing_pr=$(gh pr list --repo "$ORG/$repo" --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>&1 || echo "")
            if [ -n "$existing_pr" ]; then
              echo "  PR #$existing_pr already open, skipping"
              continue
            fi

            # Clone target repo
            WORK_DIR=$(mktemp -d)
            gh repo clone "$ORG/$repo" "$WORK_DIR" -- --depth=1 -b "$default_branch"

            cd "$WORK_DIR"
            git checkout -b "$BRANCH_NAME"

            # Sync workflow files (skip paperclip -- canonical source)
            if [ "$repo" != "paperclip" ]; then
              mkdir -p .github/workflows
              for f in "$SHARED_DIR"/workflows/*.yml; do
                [ -f "$f" ] || continue
                cp "$f" ".github/workflows/$(basename "$f")"
              done
            fi

            # Sync rule files
            mkdir -p .claude/rules
            for f in "$SHARED_DIR"/rules/*.md; do
              [ -f "$f" ] || continue
              cp "$f" ".claude/rules/$(basename "$f")"
            done

            # Sync skill files
            if [ -d "$SHARED_DIR/skills" ]; then
              find "$SHARED_DIR/skills" -type f | while read -r f; do
                rel_path="${f#$SHARED_DIR/skills/}"
                mkdir -p ".claude/skills/$(dirname "$rel_path")"
                cp "$f" ".claude/skills/$rel_path"
              done
            fi

            # Update version marker
            mkdir -p .claude
            echo "$NEW_VERSION" > .claude/.shared-version

            # Check if anything changed
            if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
              echo "  No changes, skipping"
              cd /
              rm -rf "$WORK_DIR"
              continue
            fi

            # Commit and push
            git add -A
            git commit -m "chore: sync shared config (v${NEW_VERSION})"
            git push origin "$BRANCH_NAME" --force 2>&1

            # Create PR
            PR_URL=$(gh pr create \
              --repo "$ORG/$repo" \
              --base "$default_branch" \
              --head "$BRANCH_NAME" \
              --title "chore: sync shared config v${NEW_VERSION}" \
              --body "$PR_BODY" 2>&1)

            echo "  PR created: $PR_URL"

            cd /
            rm -rf "$WORK_DIR"
            echo
          done

          echo "Sync complete (v${NEW_VERSION})"
